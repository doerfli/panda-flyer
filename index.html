<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda fliegt</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- UI Layer -->
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <div class="glass-panel">
                    <h1>PANDA<br>FLIEGT</h1>
                    <p>Steuere den Panda mit den ← → Tasten aus 2000m Höhe sicher auf den Boden.</p>
                    <button id="btn-start" class="btn">Sprung wagen</button>
                </div>
            </div>
            
            <div id="hud" class="hidden">
                <div class="left-hud">
                    <div class="time-box">
                        <span id="flight-time">0.0</span><span class="unit">s</span>
                    </div>
                    <div class="altitude-box">
                        <span id="altitude">1000</span><span class="unit">m</span>
                    </div>
                </div>
                <div class="score-box">
                    <div class="coin-icon"></div>
                    <span id="score">0</span>
                </div>
            </div>
            
            <div id="game-over-screen" class="screen hidden">
                <div class="glass-panel game-over-panel">
                    <h2 id="end-title">Sichere Landung!</h2>
                    <p id="end-desc">Der Panda hat wieder festen Boden unter den Füßen.</p>

                    <div id="score-entry">
                        <div class="name-input-row">
                            <input id="player-name" class="name-input" type="text" maxlength="32" placeholder="Dein Name…" />
                            <button id="btn-save" class="btn btn-save">💾 Speichern</button>
                        </div>
                        <p id="save-status" class="save-status"></p>
                    </div>

                    <div id="highscore-list">
                        <h3 class="hs-title">🏆 Top 10</h3>
                        <table class="hs-table">
                            <thead>
                                <tr><th>#</th><th>Name</th><th>Punkte</th><th>Datum</th></tr>
                            </thead>
                            <tbody id="hs-body">
                                <tr><td colspan="4" class="hs-loading">Lade…</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <button id="btn-restart" class="btn" style="margin-top:1.5rem;">Nochmal fliegen</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
